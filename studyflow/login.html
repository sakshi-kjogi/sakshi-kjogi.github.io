<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; script-src 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'unsafe-inline'; img-src data: https:; connect-src https://*.supabase.co wss://*.supabase.co https://accounts.google.com;">
<title>StudyFlow — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*  { margin:0; padding:0; box-sizing:border-box; }

:root {
  --primary:      #6c63ff;
  --primary-dark: #5a52d5;
  --accent:       #43e97b;
  --text:         #2d2d2d;
  --text-light:   #6b7280;
  --border:       #e5e7eb;
  --error:        #ef4444;
  --success:      #16a34a;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #6c63ff 0%, #9b59b6 50%, #e91e8c 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 16px;
}

/* ── Card ── */
.card {
  background: white;
  border-radius: 24px;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Brand ── */
.brand {
  text-align: center;
  margin-bottom: 28px;
}

.logo {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary);
  letter-spacing: -1px;
}
.logo span { color: #f59e0b; }

.tagline {
  font-size: 0.9rem;
  color: var(--text-light);
  margin-top: 4px;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  background: #f3f4f6;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}

.tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  border-radius: 9px;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  color: var(--text-light);
  transition: all 0.2s;
}
.tab.active {
  background: white;
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* ── Form fields ── */
.field { margin-bottom: 16px; }

.field label {
  display: block;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.field input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 0.95rem;
  font-family: inherit;
  transition: border 0.2s, box-shadow 0.2s;
  color: var(--text);
}
.field input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
}
.field input.error { border-color: var(--error); }

/* ── Password wrap ── */
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 44px; }
.pw-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-light);
  padding: 4px;
  border-radius: 4px;
  line-height: 1;
}
.pw-eye:hover { background: #f3f4f6; }

/* ── Forgot link ── */
.forgot {
  text-align: right;
  margin-top: -8px;
  margin-bottom: 16px;
}
.forgot a {
  font-size: 0.82rem;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}
.forgot a:hover { text-decoration: underline; }

/* ── Messages ── */
.msg {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.87rem;
  font-weight: 600;
  margin-bottom: 14px;
  display: none;
}
.msg.error   { background: #fef2f2; color: var(--error);   border: 1px solid #fecaca; }
.msg.success { background: #f0fdf4; color: var(--success);  border: 1px solid #bbf7d0; }
.msg.info    { background: #eff6ff; color: #1d4ed8;         border: 1px solid #bfdbfe; }

/* ── Primary button ── */
.btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(108,99,255,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(108,99,255,0.45);
}
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--text-light);
  font-size: 0.82rem;
  font-weight: 600;
}
.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Google button ── */
.btn-google {
  width: 100%;
  padding: 11px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s;
}
.btn-google:hover { background: #f9fafb; border-color: #9ca3af; }

/* ── Spinner ── */
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Password strength ── */
.strength-bar {
  height: 4px;
  border-radius: 4px;
  background: #f3f4f6;
  margin-top: 6px;
  overflow: hidden;
}
.strength-fill {
  height: 100%;
  border-radius: 4px;
  width: 0%;
  transition: width 0.3s, background 0.3s;
}

.strength-label {
  font-size: 0.75rem;
  margin-top: 3px;
  font-weight: 600;
}

/* ── Config warning ── */
.config-warn {
  background: #fffbeb;
  border: 1px solid #fcd34d;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 0.82rem;
  color: #92400e;
  margin-bottom: 20px;
  display: none;
}

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #6c63ff, #9b59b6);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.1rem;
  font-weight: 600;
  gap: 16px;
  z-index: 999;
  transition: opacity 0.3s;
}
.loading-overlay .big-spinner {
  width: 44px;
  height: 44px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
</style>
</head>
<body>

<!-- Shown while checking existing session -->
<div class="loading-overlay" id="loading-overlay">
  <div class="big-spinner"></div>
  <span>Loading StudyFlow…</span>
</div>

<div class="card" id="auth-card" style="display:none">

  <!-- Brand -->
  <div class="brand">
    <div class="logo">Study<span>Flow</span> ✨</div>
    <p class="tagline">Your smart study companion</p>
  </div>

  <!-- Config warning (shown when placeholders not replaced) -->
  <div class="config-warn" id="config-warn">
    ⚠️ Supabase credentials not configured. Open <code>login.html</code> and replace
    <code>YOUR_SUPABASE_PROJECT_URL</code> and <code>YOUR_SUPABASE_ANON_KEY</code>.
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login"    onclick="showTab('login')">Sign In</button>
    <button class="tab"        id="tab-register" onclick="showTab('register')">Create Account</button>
  </div>

  <!-- ── LOGIN FORM ── -->
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" required>
        <button type="button" class="pw-eye" onclick="togglePw('login-password',this)" tabindex="-1">👁</button>
      </div>
    </div>
    <div class="forgot">
      <a href="#" onclick="forgotPassword(event)">Forgot password?</a>
    </div>
    <div class="msg error"   id="login-error"></div>
    <div class="msg info"    id="login-info"></div>
    <button type="submit" class="btn-primary" id="login-btn">
      <div class="spinner" id="login-spinner"></div>
      <span id="login-btn-text">Sign In</span>
    </button>
  </form>

  <!-- ── REGISTER FORM ── -->
  <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Your name" maxlength="60" autocomplete="name" required>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="reg-password" placeholder="Min 8 characters" minlength="8"
               autocomplete="new-password" required oninput="checkStrength(this.value)">
        <button type="button" class="pw-eye" onclick="togglePw('reg-password',this)" tabindex="-1">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="reg-confirm" placeholder="Repeat password"
               autocomplete="new-password" required>
        <button type="button" class="pw-eye" onclick="togglePw('reg-confirm',this)" tabindex="-1">👁</button>
      </div>
    </div>
    <div class="msg error"   id="reg-error"></div>
    <div class="msg success" id="reg-success"></div>
    <button type="submit" class="btn-primary" id="reg-btn">
      <div class="spinner" id="reg-spinner"></div>
      <span id="reg-btn-text">Create Account</span>
    </button>
  </form>

  <!-- ── OAuth ── -->
  <div class="divider"><span>or continue with</span></div>
  <button class="btn-google" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

</div><!-- .card -->

<script>
// ─────────────────────────────────────────────────────────────────
//  SUPABASE CONFIG
//  1. Go to https://supabase.com → your project → Settings → API
//  2. Copy "Project URL" and "anon / public" key below
//  3. Also run the SQL in the README to create the user_data table
// ─────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'YOUR_SUPABASE_PROJECT_URL';   // https://xxxx.supabase.co
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';

// ─────────────────────────────────────────────────────────────────

const isConfigured = !SUPABASE_URL.startsWith('YOUR_') && !SUPABASE_ANON.startsWith('YOUR_');
let sb = null;

function boot() {
  if (!isConfigured) {
    document.getElementById('config-warn').style.display = 'block';
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('auth-card').style.display = 'block';
    return;
  }

  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  } catch(e) {
    showMsg('login-error', 'Failed to initialise Supabase. Check your credentials.');
    hideLoading();
    return;
  }

  // Redirect if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      window.location.replace('index.html');
    } else {
      hideLoading();
    }
  }).catch(() => hideLoading());
}

function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('auth-card').style.display = 'block';
}

// ── Tabs ──────────────────────────────────────────────────────────
function showTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('login-form').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('register-form').style.display = isLogin ? 'none'  : 'block';
  document.getElementById('tab-login').classList.toggle('active',    isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  clearMsgs();
}

function clearMsgs() {
  ['login-error','login-info','reg-error','reg-success'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none'; el.textContent = '';
  });
}

function showMsg(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.style.display = 'block';
}

// ── Password utils ────────────────────────────────────────────────
function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text';     btn.textContent = '🙈'; }
  else                         { inp.type = 'password'; btn.textContent = '👁'; }
}

function checkStrength(pw) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 8)               score++;
  if (pw.length >= 12)              score++;
  if (/[A-Z]/.test(pw))            score++;
  if (/[0-9]/.test(pw))            score++;
  if (/[^A-Za-z0-9]/.test(pw))     score++;

  const levels = [
    { pct:'20%', color:'#ef4444', text:'Very weak' },
    { pct:'40%', color:'#f97316', text:'Weak' },
    { pct:'60%', color:'#eab308', text:'Fair' },
    { pct:'80%', color:'#84cc16', text:'Strong' },
    { pct:'100%',color:'#16a34a', text:'Very strong' },
  ];
  const lvl = levels[Math.min(score - 1, 4)] || levels[0];
  fill.style.width      = score ? lvl.pct   : '0%';
  fill.style.background = score ? lvl.color : '';
  label.textContent     = score ? lvl.text  : '';
  label.style.color     = score ? lvl.color : '';
}

// ── Loading state ─────────────────────────────────────────────────
function setLoading(prefix, on) {
  document.getElementById(prefix + '-btn').disabled = on;
  document.getElementById(prefix + '-spinner').style.display = on ? 'block' : 'none';
  document.getElementById(prefix + '-btn-text').textContent =
    on ? 'Please wait…' : (prefix === 'login' ? 'Sign In' : 'Create Account');
}

// ── Login ─────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  if (!sb) return;
  clearMsgs();
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  setLoading('login', true);
  const { error } = await sb.auth.signInWithPassword({ email, password });
  setLoading('login', false);

  if (error) showMsg('login-error', error.message);
  else       window.location.replace('index.html');
}

// ── Register ──────────────────────────────────────────────────────
async function handleRegister(e) {
  e.preventDefault();
  if (!sb) return;
  clearMsgs();

  const name     = document.getElementById('reg-name').value.trim().slice(0, 60);
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm  = document.getElementById('reg-confirm').value;

  if (password !== confirm)  { showMsg('reg-error', 'Passwords do not match'); return; }
  if (password.length < 8)   { showMsg('reg-error', 'Password must be at least 8 characters'); return; }

  setLoading('reg', true);
  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });
  setLoading('reg', false);

  if (error) {
    showMsg('reg-error', error.message);
  } else {
    showMsg('reg-success', '✅ Account created! Check your email to confirm, then sign in.');
    document.getElementById('reg-btn').style.display = 'none';
    setTimeout(() => { showTab('login'); document.getElementById('reg-btn').style.display = ''; }, 3500);
  }
}

// ── Forgot password ───────────────────────────────────────────────
async function forgotPassword(e) {
  e.preventDefault();
  if (!sb) return;
  clearMsgs();
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showMsg('login-error', 'Enter your email address first, then click Forgot password.'); return; }

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/studyflow/index.html'
  });
  if (error) showMsg('login-error', error.message);
  else       showMsg('login-info',  '✅ Reset link sent! Check your inbox.');
}

// ── Google OAuth ──────────────────────────────────────────────────
async function signInWithGoogle() {
  if (!sb) return;
  clearMsgs();
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/studyflow/index.html' }
  });
  if (error) showMsg('login-error', error.message);
}

boot();
</script>
</body>
</html>
